# Specialist Sub-Agent Registry
#
# Defines specialist sub-agents available for Tier 3 delivery.
# The Implementation Sub-Agent reads this file, scans the execution plan
# for trigger keywords, and spawns matching specialists.
#
# Trigger Matching:
#   The Implementation Sub-Agent performs a SEMANTIC scan of the execution plan —
#   not an exact grep. Each trigger string is treated as a concept: a trigger fires
#   if the plan's intent or content meaningfully matches it, even if the exact word
#   does not appear. Prefer short, unambiguous domain terms over long phrases.
#   Broad triggers (e.g. "database") activate more often; narrow ones (e.g. "RBAC")
#   activate only when that specific domain is clearly in scope.
#   Multiple specialists may activate for the same Story.
#
# Format:
#   id:             unique identifier
#   triggers:       domain keywords; semantic match against the execution plan
#   skills:         skills available to this specialist
#   context_bundle: memory/rules files loaded at spawn (in addition to base bundle)
#
# To add a project-specific specialist: append to this file.
# Specialists are not agents — they are scoped execution units with no authority.

specialists:

  - id: db-migration
    description: Schema changes, migrations, database-level operations
    triggers:
      - schema change
      - migration
      - ALTER TABLE
      - CREATE TABLE
      - database
      - ORM model
      - index
      - foreign key
    skills:
      - implement
    context_bundle:
      - contexts/memory/patterns/conventions.md  # db conventions if present
      - contexts/rules/artefacts.rules.md

  - id: api-integration
    description: External API calls, webhooks, OAuth, HTTP clients, third-party services
    triggers:
      - webhook
      - external API
      - OAuth
      - HTTP client
      - third-party
      - SDK
      - REST
      - GraphQL
      - authentication flow
    skills:
      - implement
    context_bundle:
      - contexts/memory/patterns/conventions.md  # api conventions if present
      - contexts/rules/orchestration.rules.md

  - id: ui-component
    description: Frontend components, templates, CSS, layout, client-side logic
    triggers:
      - component
      - frontend
      - CSS
      - template
      - layout
      - React
      - Vue
      - Svelte
      - HTML
      - client-side
    skills:
      - implement
    context_bundle:
      - contexts/memory/patterns/conventions.md  # ui conventions if present

  - id: security-sensitive
    description: Authentication, authorization, secrets handling, PII, encryption
    triggers:
      - authentication
      - authorization
      - permission
      - secrets
      - credentials
      - PII
      - encryption
      - JWT
      - session
      - RBAC
    skills:
      - implement
      - security-audit
    context_bundle:
      - contexts/rules/orchestration.rules.md
      - contexts/memory/decisions/_log.md  # security decisions are critical

  - id: performance-critical
    description: Performance-sensitive paths, caching, query optimization, profiling
    triggers:
      - performance
      - caching
      - query optimization
      - N+1
      - index
      - profiling
      - latency
      - throughput
      - memory pressure
    skills:
      - implement
    context_bundle:
      - contexts/memory/patterns/conventions.md
