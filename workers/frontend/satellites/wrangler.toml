name = "callibrate-satellite-dev"
main = "src/index.ts"
compatibility_date = "2024-10-22"
compatibility_flags = ["nodejs_compat"]

# ── Dev / local (binds to staging KV) ──────────────────────────────────────────

[[kv_namespaces]]
binding = "CONFIG_CACHE"
id = "f6319960eb4348d8a3a8a375f5e42d9c"

[vars]
CORE_API_URL = "https://callibrate-core-staging.frederic-geens-consulting.workers.dev"
TURNSTILE_SITE_KEY = "1x00000000000000000000AA"

# ── Staging ────────────────────────────────────────────────────────────────────

[env.staging]
name = "callibrate-satellite-staging"

[[env.staging.kv_namespaces]]
binding = "CONFIG_CACHE"
id = "f6319960eb4348d8a3a8a375f5e42d9c"

[env.staging.vars]
CORE_API_URL = "https://callibrate-core-staging.frederic-geens-consulting.workers.dev"
TURNSTILE_SITE_KEY = "1x00000000000000000000AA"

# ── Production ─────────────────────────────────────────────────────────────────

[env.production]
name = "callibrate-satellite-prod"

[[env.production.kv_namespaces]]
binding = "CONFIG_CACHE"
id = "3efd7935547146149495a9da3c2e8067"

[env.production.vars]
CORE_API_URL = "https://api.callibrate.io"
TURNSTILE_SITE_KEY = "0x4AAAAAAA_PROD_SITE_KEY"

# ── Secrets (set via wrangler secret put per env) ──────────────────────────────
# SUPABASE_URL        — Supabase project URL
# SUPABASE_ANON_KEY   — Supabase anon/public key (for satellite_configs read)
# ADMIN_SECRET        — Secret for /admin/cache/purge endpoint
# POSTHOG_API_KEY     — PostHog project API key (for satellite tracking)
# TURNSTILE_SITE_KEY is a public [vars] entry (not a secret) — replace placeholder with real Cloudflare Turnstile site key before deploy
