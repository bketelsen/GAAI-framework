name = "callibrate-core-dev"
main = "src/index.ts"
compatibility_date = "2024-10-22"
compatibility_flags = ["nodejs_compat"]

[placement]
mode = "smart"

[[hyperdrive]]
binding = "HYPERDRIVE"
# ⚠️ REPLACE with real Hyperdrive config ID after running (E06S27 AC1):
#   npx wrangler hyperdrive create callibrate-core-hyperdrive-staging \
#     --connection-string "postgresql://postgres:[PASSWORD]@db.xiilmuuafyapkhflupqx.supabase.co:5432/postgres"
id = "PLACEHOLDER_HYPERDRIVE_CONFIG_ID"
localConnectionString = "postgresql://postgres:postgres@db.xiilmuuafyapkhflupqx.supabase.co:5432/postgres"

# ── Default (dev) environment — local only, never deployed ───────────────────
# Binds to staging remote resources (queues, KV, Supabase).
# Secrets loaded from .dev.vars (gitignored).

[[queues.consumers]]
queue = "callibrate-core-queue-email-notifications-staging"
dead_letter_queue = "callibrate-core-queue-email-notifications-staging-dlq"
max_batch_size = 10
max_batch_timeout = 5

[[queues.consumers]]
queue = "callibrate-core-queue-lead-billing-staging"
dead_letter_queue = "callibrate-core-queue-lead-billing-staging-dlq"
max_batch_size = 10
max_batch_timeout = 5

[[queues.consumers]]
queue = "callibrate-core-queue-score-computation-staging"
dead_letter_queue = "callibrate-core-queue-score-computation-staging-dlq"
max_batch_size = 10
max_batch_timeout = 5

[[queues.producers]]
queue = "callibrate-core-queue-email-notifications-staging"
binding = "EMAIL_NOTIFICATIONS"

[[queues.producers]]
queue = "callibrate-core-queue-lead-billing-staging"
binding = "LEAD_BILLING"

[[queues.producers]]
queue = "callibrate-core-queue-score-computation-staging"
binding = "SCORE_COMPUTATION"

[[kv_namespaces]]
binding = "SESSIONS"
id = "eb21bf12dbd74b96928a98c866af62a1"
preview_id = "eb21bf12dbd74b96928a98c866af62a1"

[[kv_namespaces]]
binding = "RATE_LIMITING"
id = "a36dd2f3e3a649a3b605baf3519843ea"
preview_id = "a36dd2f3e3a649a3b605baf3519843ea"

[[kv_namespaces]]
binding = "FEATURE_FLAGS"
id = "24a3f09adaf34c26805ba2351d773829"
preview_id = "24a3f09adaf34c26805ba2351d773829"

[[kv_namespaces]]
binding = "EXPERT_POOL"
id = "68927a33fd9a46ec8b537a22a9cf2d20"
preview_id = "68927a33fd9a46ec8b537a22a9cf2d20"

[[analytics_engine_datasets]]
binding = "MATCHING_ANALYTICS"
dataset = "matching-metrics"

# D1 edge database for expert pool — provisioned E06S27
[[d1_databases]]
binding = "EXPERT_DB"
database_name = "expert-pool-edge-staging"
database_id = "7d8ce9de-71ac-482f-8e3e-5c023729fe8f"

# Workers AI binding (E06S21)
[ai]
binding = "AI"

# Vectorize index binding (E06S21) — index provisioned E06S27
[[vectorize]]
binding = "VECTORIZE"
index_name = "expert-profiles"

# Rate Limiter (E06S20) — namespace_id is a self-assigned integer, auto-provisioned on first deploy
[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 30, period = 60 }

# Durable Object — ExpertPoolDO write coordinator (E06S25)
[[durable_objects.bindings]]
name = "EXPERT_POOL_DO"
class_name = "ExpertPoolDO"

# DO migration tag (required for new classes)
[[migrations]]
tag = "v1"
new_classes = ["ExpertPoolDO"]

# Top-level (used by wrangler dev)
[triggers]
crons = ["*/5 * * * *", "*/15 * * * *"]

# ── Staging environment ───────────────────────────────────────────────────────

[env.staging]
name = "callibrate-core-staging"
preview_urls = true

[env.staging.vars]
WORKER_BASE_URL = "https://callibrate-core-staging.frederic-geens-consulting.workers.dev"
EMAIL_FROM_DOMAIN = "send.callibrate.io"
EMAIL_REPLY_TO = "support@callibrate.io"

