name = "callibrate-core-dev"
main = "src/index.ts"
compatibility_date = "2024-10-22"
compatibility_flags = ["nodejs_compat"]

[placement]
mode = "smart"

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "PLACEHOLDER_HYPERDRIVE_CONFIG_ID"
localConnectionString = "postgresql://postgres:postgres@db.PLACEHOLDER.supabase.co:5432/postgres"

# ── Default (dev) environment — local only, never deployed ───────────────────
# Binds to staging remote resources (queues, KV, Supabase).
# Secrets loaded from .dev.vars (gitignored).

[[queues.consumers]]
queue = "callibrate-core-queue-email-notifications-staging"
dead_letter_queue = "callibrate-core-queue-email-notifications-staging-dlq"
max_batch_size = 10
max_batch_timeout = 5

[[queues.consumers]]
queue = "callibrate-core-queue-lead-billing-staging"
dead_letter_queue = "callibrate-core-queue-lead-billing-staging-dlq"
max_batch_size = 10
max_batch_timeout = 5

[[queues.consumers]]
queue = "callibrate-core-queue-score-computation-staging"
dead_letter_queue = "callibrate-core-queue-score-computation-staging-dlq"
max_batch_size = 10
max_batch_timeout = 5

[[queues.producers]]
queue = "callibrate-core-queue-email-notifications-staging"
binding = "EMAIL_NOTIFICATIONS"

[[queues.producers]]
queue = "callibrate-core-queue-lead-billing-staging"
binding = "LEAD_BILLING"

[[queues.producers]]
queue = "callibrate-core-queue-score-computation-staging"
binding = "SCORE_COMPUTATION"

[[kv_namespaces]]
binding = "SESSIONS"
id = "eb21bf12dbd74b96928a98c866af62a1"
preview_id = "eb21bf12dbd74b96928a98c866af62a1"

[[kv_namespaces]]
binding = "FEATURE_FLAGS"
id = "24a3f09adaf34c26805ba2351d773829"
preview_id = "24a3f09adaf34c26805ba2351d773829"

[[kv_namespaces]]
binding = "EXPERT_POOL"
id = "68927a33fd9a46ec8b537a22a9cf2d20"
preview_id = "68927a33fd9a46ec8b537a22a9cf2d20"

[[analytics_engine_datasets]]
binding = "MATCHING_ANALYTICS"
dataset = "matching-metrics"

# AC1: D1 edge database for expert pool (expert-pool-edge)
# Human action required: wrangler d1 create expert-pool-edge --env staging
# Then: wrangler d1 execute expert-pool-edge --file=d1/expert-pool-edge.schema.sql --env staging
[[d1_databases]]
binding = "EXPERT_DB"
database_name = "expert-pool-edge"
database_id = "PLACEHOLDER_D1_DATABASE_ID"

# Workers AI binding
[ai]
binding = "AI"

# Vectorize index binding
[[vectorize]]
binding = "VECTORIZE"
index_name = "expert-profiles"

# Durable Object — ExpertPoolDO write coordinator (E06S25)
# AC4: singleton via idFromName('expert-pool-coordinator')
# Human action required: class migration auto-applied on first deploy
[[durable_objects.bindings]]
name = "EXPERT_POOL_DO"
class_name = "ExpertPoolDO"

# DO migration tag (required for new classes)
[[migrations]]
tag = "v1"
new_classes = ["ExpertPoolDO"]

[[rate_limiting]]
binding = "RATE_LIMITER"
namespace_id = 1001
simple = { limit = 30, period = 60 }

# CF Workflows (top-level only — not per-env; isolation via separate Worker scripts)
[[workflows]]
binding = "BOOKING_CONFIRMED_WORKFLOW"
name = "booking-confirmed-workflow"
class_name = "BookingConfirmedWorkflow"

[[workflows]]
binding = "BOOKING_COMPLETED_WORKFLOW"
name = "booking-completed-workflow"
class_name = "BookingCompletedWorkflow"

# Top-level (used by wrangler dev)
[triggers]
crons = ["*/5 * * * *", "*/15 * * * *"]

# ── Staging environment ───────────────────────────────────────────────────────

[env.staging]
name = "callibrate-core-staging"
preview_urls = true

[env.staging.vars]
WORKER_BASE_URL = "https://callibrate-core-staging.frederic-geens-consulting.workers.dev"
EMAIL_FROM_DOMAIN = "send.callibrate.io"
EMAIL_REPLY_TO = "support@callibrate.io"
# Production TURNSTILE_SECRET_KEY must be set via: wrangler secret put TURNSTILE_SECRET_KEY --env production
TURNSTILE_SECRET_KEY = "1x0000000000000000000000000000000AA"

[[env.staging.hyperdrive]]
binding = "HYPERDRIVE"
id = "PLACEHOLDER_HYPERDRIVE_CONFIG_ID"

[[env.staging.queues.consumers]]
queue = "callibrate-core-queue-email-notifications-staging"
