name = "callibrate-core-dev"
main = "src/index.ts"
compatibility_date = "2024-10-22"
compatibility_flags = ["nodejs_compat"]

# ── Default (dev) environment — local only, never deployed ───────────────────
# Binds to staging remote resources (queues, KV, Supabase).
# Secrets loaded from .dev.vars (gitignored).

[[queues.consumers]]
queue = "callibrate-core-queue-email-notifications-staging"
dead_letter_queue = "callibrate-core-queue-email-notifications-staging-dlq"
max_batch_size = 10
max_batch_timeout = 5

[[queues.consumers]]
queue = "callibrate-core-queue-lead-billing-staging"
dead_letter_queue = "callibrate-core-queue-lead-billing-staging-dlq"
max_batch_size = 10
max_batch_timeout = 5

[[queues.producers]]
queue = "callibrate-core-queue-email-notifications-staging"
binding = "EMAIL_NOTIFICATIONS"

[[queues.producers]]
queue = "callibrate-core-queue-lead-billing-staging"
binding = "LEAD_BILLING"

[[kv_namespaces]]
binding = "SESSIONS"
id = "eb21bf12dbd74b96928a98c866af62a1"
preview_id = "eb21bf12dbd74b96928a98c866af62a1"

[[kv_namespaces]]
binding = "RATE_LIMITING"
id = "a36dd2f3e3a649a3b605baf3519843ea"
preview_id = "a36dd2f3e3a649a3b605baf3519843ea"

[[kv_namespaces]]
binding = "FEATURE_FLAGS"
id = "24a3f09adaf34c26805ba2351d773829"
preview_id = "24a3f09adaf34c26805ba2351d773829"

[[kv_namespaces]]
binding = "EXPERT_POOL"
# PLACEHOLDER — run: npx wrangler kv namespace create "callibrate-core-kv-expert-pool-staging"
# Copy the returned id into this field AND into [[env.staging.kv_namespaces]] binding="EXPERT_POOL"
id = "PLACEHOLDER_EXPERT_POOL_STAGING"
preview_id = "PLACEHOLDER_EXPERT_POOL_STAGING"

# ── Staging environment ───────────────────────────────────────────────────────

[env.staging]
name = "callibrate-core-staging"

[[env.staging.queues.consumers]]
queue = "callibrate-core-queue-email-notifications-staging"
dead_letter_queue = "callibrate-core-queue-email-notifications-staging-dlq"
max_batch_size = 10
max_batch_timeout = 5

[[env.staging.queues.consumers]]
queue = "callibrate-core-queue-lead-billing-staging"
dead_letter_queue = "callibrate-core-queue-lead-billing-staging-dlq"
max_batch_size = 10
max_batch_timeout = 5

[[env.staging.queues.producers]]
queue = "callibrate-core-queue-email-notifications-staging"
binding = "EMAIL_NOTIFICATIONS"

[[env.staging.queues.producers]]
queue = "callibrate-core-queue-lead-billing-staging"
binding = "LEAD_BILLING"

[[env.staging.kv_namespaces]]
binding = "SESSIONS"
id = "eb21bf12dbd74b96928a98c866af62a1"

[[env.staging.kv_namespaces]]
binding = "RATE_LIMITING"
id = "a36dd2f3e3a649a3b605baf3519843ea"

[[env.staging.kv_namespaces]]
binding = "FEATURE_FLAGS"
id = "24a3f09adaf34c26805ba2351d773829"

[[env.staging.kv_namespaces]]
binding = "EXPERT_POOL"
# PLACEHOLDER — copy staging id from root [[kv_namespaces]] after provisioning
id = "PLACEHOLDER_EXPERT_POOL_STAGING"

# ── Production environment ────────────────────────────────────────────────────

[env.production]
name = "callibrate-core-prod"

[[env.production.queues.consumers]]
queue = "callibrate-core-queue-email-notifications-prod"
dead_letter_queue = "callibrate-core-queue-email-notifications-prod-dlq"
max_batch_size = 10
max_batch_timeout = 5

[[env.production.queues.consumers]]
queue = "callibrate-core-queue-lead-billing-prod"
dead_letter_queue = "callibrate-core-queue-lead-billing-prod-dlq"
max_batch_size = 10
max_batch_timeout = 5

[[env.production.queues.producers]]
queue = "callibrate-core-queue-email-notifications-prod"
binding = "EMAIL_NOTIFICATIONS"

[[env.production.queues.producers]]
queue = "callibrate-core-queue-lead-billing-prod"
binding = "LEAD_BILLING"

[[env.production.kv_namespaces]]
binding = "SESSIONS"
id = "dc5d4d61b04d44fe827254ae8c8bade8"

[[env.production.kv_namespaces]]
binding = "RATE_LIMITING"
id = "2305532d36024641a7ceb171dbdf98a2"

[[env.production.kv_namespaces]]
binding = "FEATURE_FLAGS"
id = "4d5d37620fe14ddfb34aa374cbc37ffe"

[[env.production.kv_namespaces]]
binding = "EXPERT_POOL"
# PLACEHOLDER — run: npx wrangler kv namespace create "callibrate-core-kv-expert-pool-prod"
# Copy the returned id into this field
id = "PLACEHOLDER_EXPERT_POOL_PROD"
