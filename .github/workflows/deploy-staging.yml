name: Deploy to Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy-core:
    runs-on: ubuntu-latest
    name: Deploy Core to Staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Deploy callibrate-core (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --env staging

  deploy-satellite:
    runs-on: ubuntu-latest
    name: Deploy Satellite to Staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: workers/satellite/package-lock.json
      - run: npm ci
        working-directory: workers/satellite
      - name: Deploy callibrate-satellite (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --env staging
          workingDirectory: workers/satellite
