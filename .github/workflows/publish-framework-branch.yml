name: Publish _subtree-export branch
on:
  push:
    branches: [main]
    paths: ['.gaai/core/**']
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Split .gaai/core/ to _subtree-export branch
        run: |
          git subtree split --prefix=.gaai/core -b _subtree-export-build
          git push origin _subtree-export-build:_subtree-export --force
