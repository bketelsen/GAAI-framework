name: Deploy to Production

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy-core:
    runs-on: ubuntu-latest
    name: Deploy Core to Production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Deploy callibrate-core (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --env production

  deploy-satellite:
    runs-on: ubuntu-latest
    name: Deploy Satellite to Production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: workers/satellite/package-lock.json
      - run: npm ci
        working-directory: workers/satellite
      - name: Deploy callibrate-satellite (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --env production
          workingDirectory: workers/satellite

  deploy-posthog-proxy:
    runs-on: ubuntu-latest
    name: Deploy PostHog Proxy to Production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: workers/posthog-proxy/package-lock.json
      - run: npm ci
        working-directory: workers/posthog-proxy
      - name: Deploy callibrate-posthog-proxy (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --env production
          workingDirectory: workers/posthog-proxy
