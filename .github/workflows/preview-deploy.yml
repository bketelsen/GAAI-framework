name: Preview Deploy

on:
  push:
    branches:
      - 'story/*'

jobs:
  preview:
    runs-on: ubuntu-latest
    name: Build, Test & Preview
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

      - name: Compute branch slug
        id: slug
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          SLUG=$(echo "$BRANCH" | tr '/' '-' | tr '[:upper:]' '[:lower:]')
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Upload preview version
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: versions upload --env staging --preview-alias ${{ steps.slug.outputs.slug }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const slug = '${{ steps.slug.outputs.slug }}';
            const previewUrl = `https://${slug}.callibrate-core-staging.frederic-geens-consulting.workers.dev`;
            const branch = '${{ github.ref_name }}';

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open'
            });

            if (prs.length === 0) {
              console.log('No open PR found for this branch — skipping comment.');
              return;
            }

            const pr = prs[0];
            const marker = '<!-- preview-deploy -->';
            const body = [
              marker,
              '## Preview Deployment',
              '',
              `**URL:** ${previewUrl}`,
              '',
              `Deployed from \`${context.sha.substring(0, 7)}\` on branch \`${branch}\`.`,
              '',
              'This preview shares staging bindings (KV, Queues, Supabase).'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body
              });
            }
