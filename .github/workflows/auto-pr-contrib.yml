name: Auto-PR from contrib branch

# Trigger: branch creation (runs from default branch) + manual dispatch for re-pushes
on:
  create:
  workflow_dispatch:
    inputs:
      contrib_branch:
        description: 'Contrib branch name (e.g. contrib/callibrate)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    # For 'create' events: only run for contrib/** branches
    # For 'workflow_dispatch': always run (branch provided as input)
    if: >-
      (github.event_name == 'create' && github.ref_type == 'branch' && startsWith(github.ref_name, 'contrib/'))
      || github.event_name == 'workflow_dispatch'
    env:
      CONTRIB_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.contrib_branch || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Extract project name from branch
        id: meta
        run: |
          PROJECT="${CONTRIB_BRANCH#contrib/}"
          MERGE_BRANCH="merge/${CONTRIB_BRANCH}"
          echo "project=$PROJECT" >> "$GITHUB_OUTPUT"
          echo "merge_branch=$MERGE_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Replace .gaai/core/ with contrib branch content
        env:
          MERGE_BRANCH: ${{ steps.meta.outputs.merge_branch }}
          PROJECT: ${{ steps.meta.outputs.project }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin "$CONTRIB_BRANCH"
          git checkout -b "$MERGE_BRANCH"
          # Remove current .gaai/core/ and replace with contrib branch content
          git rm -rf .gaai/core/
          git read-tree --prefix=.gaai/core/ -u FETCH_HEAD
          git commit -m "sync(.gaai/core): merge contrib from $PROJECT"

      - name: Push merge branch
        env:
          MERGE_BRANCH: ${{ steps.meta.outputs.merge_branch }}
        run: git push origin "$MERGE_BRANCH" --force

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_BRANCH: ${{ steps.meta.outputs.merge_branch }}
          PROJECT: ${{ steps.meta.outputs.project }}
        run: |
          EXISTING=$(gh pr list --head "$MERGE_BRANCH" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists — branch updated, PR will reflect new changes."
          else
            gh pr create \
              --title "sync(.gaai/core): contrib from $PROJECT" \
              --body "## Auto-generated sync PR

          Merges framework changes from **$PROJECT** into \`.gaai/core/\` on \`main\`.

          **Source branch:** \`$CONTRIB_BRANCH\` (flat subtree content)
          **Merge branch:** \`$MERGE_BRANCH\` (merged into \`.gaai/core/\`)

          ### Review checklist
          - [ ] Changes are generic (no project-specific content)
          - [ ] No secrets or project-specific paths leaked
          - [ ] Skills/agents/rules are consistent with OSS standards

          > Auto-created by CI when a contrib branch was pushed." \
              --base main \
              --head "$MERGE_BRANCH"
          fi
